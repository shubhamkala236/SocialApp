<div class="rounded-2xl overflow-hidden border transition-all duration-300"
     [class]="themeService.isDark()
       ? 'bg-white/5 border-white/10 hover:border-white/20'
       : 'bg-white border-slate-200 shadow-sm hover:shadow-md'">

  <!-- Author Row -->
  <div class="flex items-center justify-between px-5 pt-5">
    <a [routerLink]="['/profile', post.userId]"
       class="flex items-center gap-3 no-underline group">

      <!-- Avatar -->
      <div class="w-10 h-10 rounded-full bg-indigo-600
                  flex items-center justify-center flex-shrink-0
                  group-hover:bg-indigo-500 transition-colors duration-200 overflow-hidden">
        @if (post.userAvatarUrl) {
          <img [src]="post.userAvatarUrl"
              class="w-full h-full object-cover" />
        } @else {
          <span class="text-white text-sm font-bold">
            {{ post.username.charAt(0).toUpperCase() }}
          </span>
        }
      </div>

      <!-- Name & Time -->
      <div>
        <p class="text-sm font-semibold leading-none mb-0.5 transition-colors"
           [class]="themeService.isDark()
             ? 'text-white group-hover:text-indigo-300'
             : 'text-slate-800 group-hover:text-indigo-600'">
          {{ post.username }}
        </p>
        <p class="text-xs"
           [class]="themeService.isDark() ? 'text-slate-500' : 'text-slate-400'">
          {{ timeAgo }}
        </p>
      </div>
    </a>

    <!-- Owner Menu -->
    @if (isOwner) {
      <button mat-icon-button [matMenuTriggerFor]="actionMenu">
        <mat-icon class="!text-base"
                  [class]="themeService.isDark()
                    ? 'text-slate-400' : 'text-slate-400'">
          more_horiz
        </mat-icon>
      </button>
      <mat-menu #actionMenu="matMenu">
        <a mat-menu-item [routerLink]="['/posts/edit', post.id]">
          <mat-icon>edit</mat-icon><span>Edit</span>
        </a>
        <button mat-menu-item (click)="deletePost.emit(post.id)"
                class="!text-red-500">
          <mat-icon class="!text-red-500">delete</mat-icon>
          <span>Delete</span>
        </button>
      </mat-menu>
    }
  </div>

  <!-- Title & Content -->
  <div class="px-5 pt-4">
    <h3 class="text-lg font-bold mb-2 leading-snug"
        [class]="themeService.isDark() ? 'text-white' : 'text-slate-800'">
      {{ post.title }}
    </h3>
    <p class="text-sm leading-relaxed"
       [class]="themeService.isDark() ? 'text-slate-400' : 'text-slate-500'">
      {{ post.content }}
    </p>
  </div>

  <!-- Image — full width -->
  @if (post.imageUrl) {
    <div class="mt-4 w-full overflow-hidden">
      <img [src]="post.imageUrl"
           [alt]="post.title"
           class="w-full max-h-96 object-cover
                  hover:scale-[1.02] transition-transform duration-500" />
    </div>
  }

  <!-- Actions Row -->
  <div class="flex items-center justify-between px-5 py-3 mt-1 border-t"
       [class]="themeService.isDark() ? 'border-white/10' : 'border-slate-100'">

    <!-- Like -->
    <button (click)="onToggleLike()"
            [disabled]="isLiking()"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl
                   transition-all duration-200 text-sm font-medium"
            [class]="isLiked()
              ? 'text-red-500 bg-red-50 dark:bg-red-500/10'
              : themeService.isDark()
                ? 'text-slate-400 hover:text-red-400 hover:bg-red-500/10'
                : 'text-slate-500 hover:text-red-500 hover:bg-red-50'">
      <mat-icon class="!text-lg transition-transform duration-200"
                [class.scale-125]="isLiked()">
        {{ isLiked() ? 'favorite' : 'favorite_border' }}
      </mat-icon>
      <span>{{ likesCount() }}</span>
    </button>

    <!-- Right Actions -->
    <div class="flex items-center gap-1">

      <!-- Save -->
      <button (click)="onToggleSave()"
              [disabled]="isSaving()"
              [matTooltip]="isSaved() ? 'Unsave' : 'Save'"
              class="flex items-center justify-center
                     w-9 h-9 rounded-xl
                     transition-all duration-200"
              [class]="isSaved()
                ? 'text-indigo-500 bg-indigo-50'
                : themeService.isDark()
                  ? 'text-slate-400 hover:text-indigo-400 hover:bg-indigo-500/10'
                  : 'text-slate-400 hover:text-indigo-500 hover:bg-indigo-50'">
        <mat-icon class="!text-lg">
          {{ isSaved() ? 'bookmark' : 'bookmark_border' }}
        </mat-icon>
      </button>

    </div>
  </div>

</div>
