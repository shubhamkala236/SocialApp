<!-- post-card.component.html -->
<div class="rounded-2xl overflow-hidden shadow-sm hover:shadow-md
            transition-all duration-300 border"
     [class]="themeService.isDark()
       ? 'bg-white/5 border-white/10 hover:border-white/20'
       : 'bg-white border-slate-200 hover:border-indigo-200'">

  <!-- Image -->
  @if (post.imageUrl) {
    <div class="w-full h-48 overflow-hidden">
      <img [src]="post.imageUrl"
           [alt]="post.title"
           class="w-full h-full object-cover hover:scale-105 transition-transform duration-500" />
    </div>
  }

  <div class="p-5">

    <!-- Author & Time -->
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center flex-shrink-0">
          <span class="text-white text-xs font-bold">
            {{ post.username.charAt(0).toUpperCase() }}
          </span>
        </div>
        <span class="text-sm font-medium"
              [class]="themeService.isDark() ? 'text-indigo-300' : 'text-indigo-600'">
          @{{ post.username }}
        </span>
      </div>

      <div class="flex items-center gap-1">
        <span class="text-xs"
              [class]="themeService.isDark() ? 'text-slate-500' : 'text-slate-400'">
          {{ timeAgo }}
        </span>

        <!-- Owner Actions Menu -->
        @if (isOwner) {
          <button mat-icon-button [matMenuTriggerFor]="actionMenu"
                  class="!w-7 !h-7 !leading-none">
            <mat-icon class="!text-base"
                      [class]="themeService.isDark() ? 'text-slate-400' : 'text-slate-500'">
              more_vert
            </mat-icon>
          </button>
          <mat-menu #actionMenu="matMenu">
            <a mat-menu-item [routerLink]="['/posts/edit', post.id]">
              <mat-icon>edit</mat-icon>
              <span>Edit</span>
            </a>
            <button mat-menu-item (click)="deletePost.emit(post.id)"
                    class="!text-red-500">
              <mat-icon class="!text-red-500">delete</mat-icon>
              <span>Delete</span>
            </button>
          </mat-menu>
        }
      </div>
    </div>

    <!-- Title -->
    <h3 class="text-lg font-bold mb-2 leading-snug"
        [class]="themeService.isDark() ? 'text-white' : 'text-slate-800'">
      {{ post.title }}
    </h3>

    <!-- Content -->
    <p class="text-sm leading-relaxed line-clamp-3"
       [class]="themeService.isDark() ? 'text-slate-400' : 'text-slate-500'">
      {{ post.content }}
    </p>

    <!-- Footer -->
    @if (post.updatedAt) {
      <div class="mt-3 pt-3 border-t"
           [class]="themeService.isDark() ? 'border-white/10' : 'border-slate-100'">
        <span class="text-xs"
              [class]="themeService.isDark() ? 'text-slate-600' : 'text-slate-400'">
          Edited
        </span>
      </div>
    }

  </div>
</div>
